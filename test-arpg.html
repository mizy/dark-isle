<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARPG Game Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #game-container { width: 100vw; height: 100vh; }
    #ui {
      position: absolute; top: 10px; left: 10px; color: #fff;
      background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
      pointer-events: none; min-width: 200px;
    }
    .bar-container { margin: 8px 0; }
    .bar-label { font-size: 12px; margin-bottom: 2px; }
    .bar { height: 16px; background: #333; border-radius: 8px; overflow: hidden; }
    .bar-fill { height: 100%; transition: width 0.2s; }
    .hp { background: linear-gradient(90deg, #00d4ff, #0099cc); }
    .mp { background: linear-gradient(90deg, #9933ff, #6600cc); }
    .exp { background: linear-gradient(90deg, #ffaa00, #ff6600); }
    .stats { font-size: 11px; color: #aaa; margin-top: 10px; }
    .skill-bar {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px;
      border-radius: 10px;
    }
    .skill {
      width: 60px; height: 60px; border: 2px solid #444; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 10px; color: #fff; cursor: pointer; position: relative;
      background: #222; transition: all 0.2s;
    }
    .skill:hover { border-color: #00d4ff; transform: scale(1.05); }
    .skill.cooldown { opacity: 0.5; cursor: not-allowed; }
    .skill .key { position: absolute; top: 2px; left: 4px; font-size: 9px; color: #888; }
    .skill .icon { font-size: 20px; margin-bottom: 2px; }
    #scene-selector {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
    }
    #scene-selector button {
      background: #333; color: #fff; border: none; padding: 8px 16px;
      margin: 0 5px; border-radius: 4px; cursor: pointer;
    }
    #scene-selector button:hover { background: #00d4ff; }
    #log {
      position: absolute; bottom: 100px; left: 10px;
      color: #fff; font-size: 12px; max-width: 300px;
      text-shadow: 1px 1px 2px #000;
    }
    .log-entry { margin: 2px 0; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="ui">
    <div class="bar-container">
      <div class="bar-label">生命值 <span id="hp-text">100/100</span></div>
      <div class="bar"><div class="bar-fill hp" id="hp-bar" style="width:100%"></div></div>
    </div>
    <div class="bar-container">
      <div class="bar-label">魔法值 <span id="mp-text">50/50</span></div>
      <div class="bar"><div class="bar-fill mp" id="mp-bar" style="width:100%"></div></div>
    </div>
    <div class="bar-container">
      <div class="bar-label">经验值 <span id="exp-text">0/100</span></div>
      <div class="bar"><div class="bar-fill exp" id="exp-bar" style="width:0%"></div></div>
    </div>
    <div class="stats">
      等级: <span id="level">1</span> | 攻击力: <span id="atk">10</span> | 防御: <span id="def">0</span>
    </div>
  </div>
  <div class="skill-bar">
    <div class="skill" data-skill="0" onclick="useSkill(0)"><span class="key">1</span><span class="icon">⚔️</span><span>斩击</span></div>
    <div class="skill" data-skill="1" onclick="useSkill(1)"><span class="key">2</span><span class="icon">🔥</span><span>火球</span></div>
    <div class="skill" data-skill="2" onclick="useSkill(2)"><span class="key">3</span><span class="icon">🛡️</span><span>护盾</span></div>
    <div class="skill" data-skill="3" onclick="useSkill(3)"><span class="key">4</span><span class="icon">💫</span><span>治疗</span></div>
  </div>
  <div id="scene-selector">
    <button onclick="switchScene('grassland')">草原</button>
    <button onclick="switchScene('town')">主城</button>
  </div>
  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script>
const TILE_SIZE = 32;
const MAP_WIDTH = 30;
const MAP_HEIGHT = 30;

class GameScene extends Phaser.Scene {
  constructor() {
    super({ key: 'GameScene' });
    this.currentMap = 'grassland';
  }

  create() {
    this.player = this.createPlayer();
    this.enemies = [];
    this.effects = [];
    this.particles = [];
    this.projectiles = [];
    this.keys = {};
    
    this.cameras.main.setBounds(0, 0, MAP_WIDTH * TILE_SIZE, MAP_HEIGHT * TILE_SIZE);
    this.cameras.main.startFollow(this.player.sprite, true, 0.08, 0.08);
    this.cameras.main.setZoom(1.5);
    
    this.buildMap(this.currentMap);
    this.spawnEnemies();
    this.setupInput();
    this.physics.world.setBounds(0, 0, MAP_WIDTH * TILE_SIZE, MAP_HEIGHT * TILE_SIZE);
    
    this.uiUpdate();
    this.add.text(10, this.scale.height - 30, 'WASD移动 | 1-4技能 | 点击地面移动', {
      fontSize: '14px', color: '#fff', backgroundColor: '#0008'
    }).setScrollFactor(0).setDepth(1000);
  }

  createPlayer() {
    const g = this.make.graphics();
    g.fillStyle(0xe06040);
    g.fillRect(0, 0, 24, 32);
    g.fillStyle(0xf0c090);
    g.fillCircle(12, 6, 6);
    g.generateTexture('player', 24, 32);
    g.destroy();
    
    const sprite = this.physics.add.sprite(200, 200, 'player');
    sprite.setCollideWorldBounds(true);
    
    const shadow = this.add.ellipse(0, 28, 20, 8, 0x000000, 0.3);
    
    return {
      sprite, shadow,
      hp: 100, maxHp: 100,
      mp: 50, maxMp: 50,
      exp: 0, maxExp: 100,
      level: 1, atk: 10, def: 0,
      speed: 150,
      targetX: sprite.x, targetY: sprite.y,
      isMovingToTarget: false,
      skills: [
        { name: '斩击', mp: 0, cd: 0, maxCd: 1000, damage: 20, range: 60 },
        { name: '火球', mp: 15, cd: 0, maxCd: 3000, damage: 35, range: 200, projectile: true },
        { name: '护盾', mp: 20, cd: 0, maxCd: 8000, damage: 0, shield: 30, duration: 3000 },
        { name: '治疗', mp: 25, cd: 0, maxCd: 6000, damage: -30, range: 0 }
      ],
      passive: { lifesteal: 0.05, mpRegen: 0.5 },
      shield: 0,
      shieldTime: 0
    };
  }

  buildMap(type) {
    if (this.mapLayer) this.mapLayer.destroy();
    if (this.decorations) this.decorations.destroy();
    
    const bgColor = type === 'grassland' ? 0x2d5a27 : 0x4a4a5a;
    this.cameras.main.setBackgroundColor(bgColor);
    
    this.mapData = [];
    for (let y = 0; y < MAP_HEIGHT; y++) {
      this.mapData[y] = [];
      for (let x = 0; x < MAP_WIDTH; x++) {
        let tile = 0;
        if (type === 'grassland') {
          tile = Math.random() < 0.1 ? 1 : 0;
        } else {
          tile = Math.random() < 0.3 ? 2 : 0;
          if (x === 0 || x === MAP_WIDTH-1 || y === 0 || y === MAP_HEIGHT-1) tile = 2;
        }
        this.mapData[y][x] = { walkable: tile !== 2, tile };
      }
    }
    
    this.mapLayer = this.add.group();
    this.decorations = this.add.group();
    
    for (let y = 0; y < MAP_HEIGHT; y++) {
      for (let x = 0; x < MAP_WIDTH; x++) {
        const px = x * TILE_SIZE + TILE_SIZE / 2;
        const py = y * TILE_SIZE + TILE_SIZE / 2;
        
        let color;
        if (type === 'grassland') {
          color = this.mapData[y][x].tile === 1 ? 0x3d6b4a : 0x4a7c59;
        } else {
          color = this.mapData[y][x].tile === 2 ? 0x666677 : 0x5a5a6a;
        }
        
        const tile = this.add.rectangle(px, py, TILE_SIZE - 2, TILE_SIZE - 2, color);
        tile.setStrokeStyle(1, 0x00000020);
        this.mapLayer.add(tile);
        
        if (type === 'grassland' && Math.random() < 0.05) {
          const tree = this.add.circle(px, py - 10, 8, 0x1a4a1a);
          tree.setDepth(py);
          this.decorations.add(tree);
        } else if (type === 'town' && Math.random() < 0.08) {
          const building = this.add.rectangle(px, py - 15, 20, 25, 0x8b7355);
          building.setDepth(py);
          this.decorations.add(building);
        }
      }
    }
  }

  spawnEnemies() {
    this.enemies.forEach(e => e.sprite.destroy());
    this.enemies = [];
    
    const count = this.currentMap === 'grassland' ? 5 : 8;
    const types = this.currentMap === 'grassland' 
      ? [{ name: '史莱姆', hp: 30, atk: 5, color: 0x00ff00, exp: 20 }]
      : [{ name: '骷髅', hp: 50, atk: 10, color: 0xcccccc, exp: 35 }, { name: '哥布林', hp: 40, atk: 8, color: 0x228b22, exp: 25 }];
    
    for (let i = 0; i < count; i++) {
      const type = types[Math.floor(Math.random() * types.length)];
      const x = 50 + Math.random() * (MAP_WIDTH * TILE_SIZE - 100);
      const y = 50 + Math.random() * (MAP_HEIGHT * TILE_SIZE - 100);
      
      const g = this.make.graphics();
      g.fillStyle(type.color);
      g.fillRect(0, 0, 22, 28);
      g.fillStyle(0xff0000);
      g.fillRect(5, 4, 4, 4);
      g.fillRect(13, 4, 4, 4);
      g.generateTexture('enemy_' + i, 22, 28);
      g.destroy();
      
      const sprite = this.physics.add.sprite(x, y, 'enemy_' + i);
      sprite.setCollideWorldBounds(true);
      
      this.enemies.push({
        sprite, name: type.name,
        hp: type.hp, maxHp: type.hp,
        atk: type.atk, exp: type.exp,
        speed: 60 + Math.random() * 20,
        state: 'idle',
        targetX: x, targetY: y,
        lastAttack: 0,
        skillCooldown: 0,
        ai: { patrolTarget: null, patrolTime: 0, chaseRange: 150, attackRange: 40 }
      });
    }
  }

  setupInput() {
    this.keys = this.input.keyboard.addKeys({
      w: Phaser.Input.Keyboard.KeyCodes.W,
      a: Phaser.Input.Keyboard.KeyCodes.A,
      s: Phaser.Input.Keyboard.KeyCodes.S,
      d: Phaser.Input.Keyboard.KeyCodes.D,
      one: Phaser.Input.Keyboard.KeyCodes.ONE,
      two: Phaser.Input.Keyboard.KeyCodes.TWO,
      three: Phaser.Input.Keyboard.KeyCodes.THREE,
      four: Phaser.Input.Keyboard.KeyCodes.FOUR
    });
    
    this.input.on('pointerdown', (pointer) => {
      const worldPoint = this.cameras.main.getWorldPoint(pointer.x, pointer.y);
      this.player.targetX = worldPoint.x;
      this.player.targetY = worldPoint.y;
      this.player.isMovingToTarget = true;
    });
  }

  update(time, delta) {
    const dt = delta / 1000;
    this.handleInput(dt);
    this.handlePlayerMovement(dt);
    this.handlePlayerSkills(time);
    this.updateEnemies(time, dt);
    this.updateProjectiles(dt);
    this.updateEffects(dt);
    this.updateUI(time);
    this.checkCollisions();
    
    if (this.player.shieldTime > 0) {
      this.player.shieldTime -= delta;
      if (this.player.shieldTime <= 0) this.player.shield = 0;
    }
  }

  handleInput(dt) {
    if (this.keys.one.isDown) this.useSkill(0);
    if (this.keys.two.isDown) this.useSkill(1);
    if (this.keys.three.isDown) this.useSkill(2);
    if (this.keys.four.isDown) this.useSkill(3);
    
    let dx = 0, dy = 0;
    if (this.keys.w.isDown) dy -= 1;
    if (this.keys.s.isDown) dy += 1;
    if (this.keys.a.isDown) dx -= 1;
    if (this.keys.d.isDown) dx += 1;
    
    if (dx !== 0 || dy !== 0) {
      this.player.isMovingToTarget = false;
      const len = Math.sqrt(dx * dx + dy * dy);
      this.player.sprite.setVelocity((dx / len) * this.player.speed, (dy / len) * this.player.speed);
    } else if (!this.player.isMovingToTarget) {
      this.player.sprite.setVelocity(0, 0);
    }
  }

  handlePlayerMovement(dt) {
    if (!this.player.isMovingToTarget) return;
    
    const dx = this.player.targetX - this.player.sprite.x;
    const dy = this.player.targetY - this.player.sprite.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 5) {
      this.player.sprite.x = this.player.targetX;
      this.player.sprite.y = this.player.targetY;
      this.player.isMovingToTarget = false;
      this.player.sprite.setVelocity(0, 0);
    } else {
      const speed = this.player.speed * dt;
      const vx = (dx / dist) * speed;
      const vy = (dy / dist) * speed;
      this.player.sprite.x += vx;
      this.player.sprite.y += vy;
    }
    
    this.player.sprite.x = Phaser.Math.Clamp(this.player.sprite.x, 10, MAP_WIDTH * TILE_SIZE - 10);
    this.player.sprite.y = Phaser.Math.Clamp(this.player.sprite.y, 10, MAP_HEIGHT * TILE_SIZE - 10);
    
    this.player.shadow.x = this.player.sprite.x;
    this.player.shadow.y = this.player.sprite.y + 14;
    this.player.sprite.setDepth(this.player.sprite.y + 16);
  }

  handlePlayerSkills(time) {
    this.player.skills.forEach((skill, i) => {
      if (skill.cd > 0) skill.cd -= 16;
    });
  }

  useSkill(index) {
    const skill = this.player.skills[index];
    if (skill.cd > 0) {
      this.log('技能冷却中...');
      return;
    }
    if (skill.mp > this.player.mp) {
      this.log('魔法值不足!');
      return;
    }
    
    this.player.mp -= skill.mp;
    skill.cd = skill.maxCd;
    
    if (skill.shield) {
      this.player.shield = skill.shield;
      this.player.shieldTime = skill.duration;
      this.createEffect(this.player.sprite.x, this.player.sprite.y, 'shield');
      this.log('施放护盾 +' + skill.shield);
    } else if (skill.damage < 0) {
      const heal = -skill.damage;
      this.player.hp = Math.min(this.player.maxHp, this.player.hp + heal);
      this.createEffect(this.player.sprite.x, this.player.sprite.y, 'heal');
      this.log('恢复生命 +' + heal);
    } else if (skill.projectile) {
      const angle = this.getNearestEnemyAngle();
      if (angle !== null) {
        this.createProjectile(this.player.sprite.x, this.player.sprite.y, angle, skill.damage, skill.range);
        this.log('发射火球!');
      } else {
        this.log('没有目标!');
      }
    } else {
      const target = this.findNearestEnemy(skill.range);
      if (target) {
        this.damageEnemy(target, skill.damage);
        this.createEffect(target.sprite.x, target.sprite.y, 'slash');
        this.log('斩击造成 ' + skill.damage + ' 伤害!');
      } else {
        this.log('没有在范围内的敌人!');
      }
    }
  }

  getNearestEnemyAngle() {
    let nearest = null, minDist = Infinity;
    this.enemies.forEach(e => {
      const dist = Phaser.Math.Distance.Between(this.player.sprite.x, this.player.sprite.y, e.sprite.x, e.sprite.y);
      if (dist < minDist) { minDist = dist; nearest = e; }
    });
    if (nearest && minDist < 300) {
      return Phaser.Math.Angle.Between(this.player.sprite.x, this.player.sprite.y, nearest.sprite.x, nearest.sprite.y);
    }
    return 0;
  }

  findNearestEnemy(range) {
    let nearest = null, minDist = range;
    this.enemies.forEach(e => {
      const dist = Phaser.Math.Distance.Between(this.player.sprite.x, this.player.sprite.y, e.sprite.x, e.sprite.y);
      if (dist < minDist) { minDist = dist; nearest = e; }
    });
    return nearest;
  }

  createProjectile(x, y, angle, damage, range) {
    const g = this.make.graphics();
    g.fillStyle(0xff6600);
    g.fillCircle(0, 0, 8);
    g.generateTexture('projectile', 16, 16);
    g.destroy();
    
    const proj = this.physics.add.sprite(x, y, 'projectile');
    proj.setVelocity(Math.cos(angle) * 300, Math.sin(angle) * 300);
    proj.damage = damage;
    proj.life = 0;
    proj.maxLife = range / 300;
    this.projectiles.push(proj);
  }

  updateProjectiles(dt) {
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const proj = this.projectiles[i];
      proj.life += dt;
      if (proj.life > proj.maxLife) {
        proj.destroy();
        this.projectiles.splice(i, 1);
      }
    }
  }

  createEffect(x, y, type) {
    const colors = { slash: 0xff6600, heal: 0x00ff00, shield: 0x00aaff, hit: 0xff0000 };
    const color = colors[type] || 0xffffff;
    const effect = this.add.circle(x, y, 15, color, 0.7);
    effect.life = 0;
    effect.maxLife = 0.3;
    effect.type = type;
    this.effects.push(effect);
  }

  updateEffects(dt) {
    for (let i = this.effects.length - 1; i >= 0; i--) {
      const e = this.effects[i];
      e.life += dt;
      e.setAlpha(1 - e.life / e.maxLife);
      e.setScale(1 + e.life * 2);
      if (e.life > e.maxLife) {
        e.destroy();
        this.effects.splice(i, 1);
      }
    }
  }

  updateEnemies(time, dt) {
    this.enemies.forEach(enemy => {
      if (enemy.skillCooldown > 0) enemy.skillCooldown -= dt * 1000;
      
      const distToPlayer = Phaser.Math.Distance.Between(
        enemy.sprite.x, enemy.sprite.y,
        this.player.sprite.x, this.player.sprite.y
      );
      
      if (distToPlayer < enemy.ai.chaseRange) {
        enemy.state = 'chase';
        enemy.targetX = this.player.sprite.x;
        enemy.targetY = this.player.sprite.y;
        
        if (distToPlayer < enemy.ai.attackRange && time - enemy.lastAttack > 1500) {
          enemy.lastAttack = time;
          this.enemyAttack(enemy);
        }
        
        if (enemy.skillCooldown <= 0 && distToPlayer < 100) {
          this.enemyUseSkill(enemy);
          enemy.skillCooldown = 5000 + Math.random() * 3000;
        }
      } else {
        enemy.state = 'patrol';
        enemy.ai.patrolTime -= dt;
        if (enemy.ai.patrolTime <= 0 || !enemy.ai.patrolTarget) {
          enemy.ai.patrolTarget = {
            x: 50 + Math.random() * (MAP_WIDTH * TILE_SIZE - 100),
            y: 50 + Math.random() * (MAP_HEIGHT * TILE_SIZE - 100)
          };
          enemy.ai.patrolTime = 3 + Math.random() * 4;
        }
        enemy.targetX = enemy.ai.patrolTarget.x;
        enemy.targetY = enemy.ai.patrolTarget.y;
      }
      
      const dx = enemy.targetX - enemy.sprite.x;
      const dy = enemy.targetY - enemy.sprite.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist > 5) {
        const avoidForce = this.getAvoidanceForce(enemy);
        const vx = (dx / dist) * enemy.speed + avoidForce.x * 30;
        const vy = (dy / dist) * enemy.speed + avoidForce.y * 30;
        const vLen = Math.sqrt(vx * vx + vy * vy);
        enemy.sprite.x += (vx / vLen) * enemy.speed * dt;
        enemy.sprite.y += (vy / vLen) * enemy.speed * dt;
      }
      
      enemy.sprite.x = Phaser.Math.Clamp(enemy.sprite.x, 10, MAP_WIDTH * TILE_SIZE - 10);
      enemy.sprite.y = Phaser.Math.Clamp(enemy.sprite.y, 10, MAP_HEIGHT * TILE_SIZE - 10);
      enemy.sprite.setDepth(enemy.sprite.y + 16);
    });
  }

  getAvoidanceForce(enemy) {
    let force = { x: 0, y: 0 };
    this.enemies.forEach(other => {
      if (other === enemy) return;
      const dist = Phaser.Math.Distance.Between(enemy.sprite.x, enemy.sprite.y, other.sprite.x, other.sprite.y);
      if (dist < 40) {
        const dx = enemy.sprite.x - other.sprite.x;
        const dy = enemy.sprite.y - other.sprite.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        force.x += dx / len;
        force.y += dy / len;
      }
    });
    return force;
  }

  enemyAttack(enemy) {
    const damage = Math.max(1, enemy.atk - this.player.def);
    let finalDamage = damage;
    
    if (this.player.shield > 0) {
      const shieldAbsorb = Math.min(this.player.shield, finalDamage);
      this.player.shield -= shieldAbsorb;
      finalDamage -= shieldAbsorb;
    }
    
    if (finalDamage > 0) {
      this.player.hp -= finalDamage;
      this.createEffect(this.player.sprite.x, this.player.sprite.y, 'hit');
      this.log(enemy.name + ' 攻击! -' + finalDamage);
    }
    
    if (this.player.hp <= 0) {
      this.log('你已阵亡! 5秒后重生...');
      this.player.hp = this.player.maxHp;
      this.player.sprite.x = 200;
      this.player.sprite.y = 200;
    }
  }

  enemyUseSkill(enemy) {
    const skills = [
      { name: '猛击', effect: () => {
        const d = enemy.atk * 1.5;
        if (this.player.shield > 0) {
          const s = Math.min(this.player.shield, d);
          this.player.shield -= s;
        }
        this.player.hp -= Math.max(0, d - this.player.def);
        this.createEffect(this.player.sprite.x, this.player.sprite.y, 'hit');
      }},
      { name: '毒雾', effect: () => {
        this.player.hp -= 5;
        this.log(enemy.name + ' 施放毒雾!');
      }}
    ];
    const skill = skills[Math.floor(Math.random() * skills.length)];
    skill.effect();
    this.log(enemy.name + ' 使用 ' + skill.name + '!');
  }

  damageEnemy(enemy, damage) {
    enemy.hp -= damage;
    this.createEffect(enemy.sprite.x, enemy.sprite.y, 'hit');
    
    if (this.player.passive.lifesteal > 0) {
      const heal = damage * this.player.passive.lifesteal;
      this.player.hp = Math.min(this.player.maxHp, this.player.hp + heal);
    }
    
    if (enemy.hp <= 0) {
      this.log('击杀 ' + enemy.name + '! +' + enemy.exp + ' 经验');
      this.player.exp += enemy.exp;
      enemy.sprite.destroy();
      const idx = this.enemies.indexOf(enemy);
      if (idx > -1) this.enemies.splice(idx, 1);
      
      if (this.player.exp >= this.player.maxExp) {
        this.levelUp();
      }
    }
  }

  levelUp() {
    this.player.level++;
    this.player.exp -= this.player.maxExp;
    this.player.maxExp = Math.floor(this.player.maxExp * 1.5);
    this.player.maxHp += 20;
    this.player.hp = this.player.maxHp;
    this.player.maxMp += 10;
    this.player.mp = this.player.maxMp;
    this.player.atk += 5;
    this.player.def += 2;
    this.log('升级! 等级 ' + this.player.level);
  }

  checkCollisions() {
    this.projectiles.forEach((proj, pi) => {
      this.enemies.forEach(enemy => {
        if (Phaser.Math.Distance.Between(proj.x, proj.y, enemy.sprite.x, enemy.sprite.y) < 20) {
          this.damageEnemy(enemy, proj.damage);
          proj.destroy();
          this.projectiles.splice(pi, 1);
        }
      });
    });
  }

  updateUI(time) {
    document.getElementById('hp-text').textContent = `${Math.floor(this.player.hp)}/${this.player.maxHp}`;
    document.getElementById('hp-bar').style.width = (this.player.hp / this.player.maxHp * 100) + '%';
    
    document.getElementById('mp-text').textContent = `${Math.floor(this.player.mp)}/${this.player.maxMp}`;
    document.getElementById('mp-bar').style.width = (this.player.mp / this.player.maxMp * 100) + '%';
    
    document.getElementById('exp-text').textContent = `${this.player.exp}/${this.player.maxExp}`;
    document.getElementById('exp-bar').style.width = (this.player.exp / this.player.maxExp * 100) + '%';
    
    document.getElementById('level').textContent = this.player.level;
    document.getElementById('atk').textContent = this.player.atk;
    document.getElementById('def').textContent = this.player.def;
    
    this.player.skills.forEach((skill, i) => {
      const el = document.querySelector(`.skill[data-skill="${i}"]`);
      if (skill.cd > 0) {
        el.classList.add('cooldown');
        el.style.setProperty('--cd', (skill.cd / skill.maxCd * 100) + '%');
      } else {
        el.classList.remove('cooldown');
      }
    });
  }

  log(msg) {
    const log = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.textContent = msg;
    log.appendChild(entry);
    setTimeout(() => entry.remove(), 3000);
  }
}

const config = {
  type: Phaser.AUTO,
  parent: 'game-container',
  width: window.innerWidth,
  height: window.innerHeight,
  physics: { default: 'arcade', arcade: { debug: false } },
  scene: GameScene
};

let game = new Phaser.Game(config);
let scene;
game.events.on('ready', () => { scene = game.scene.getScene('GameScene'); });

function useSkill(index) { if (scene) scene.useSkill(index); }
function switchScene(type) { if (scene) { scene.currentMap = type; scene.buildMap(type); scene.spawnEnemies(); } }

window.addEventListener('resize', () => { game.scale.resize(window.innerWidth, window.innerHeight); });
  </script>
</body>
